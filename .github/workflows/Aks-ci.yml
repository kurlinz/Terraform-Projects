name: AKS CI
on:
  push:
    paths:
     - aks_cluster/**
  workflow_dispatch:
permissions:
    contents: read
    id-token: write
jobs:
  terraform-validate:
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: ./aks_cluster
      steps:
        # Checks out the repository this file is in
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: setup terraform
          uses: hashicorp/setup-terraform@v2

        - name: Azure Login
          uses: azure/login@v2
          with:
            client-id: ${{ secrets.AZURE_CLIENT_ID }}
            tenant-id: ${{ secrets.AZURE_TENANT_ID }}
            subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

        - name: Terraform Initialize
          run: |
            terraform init \
              -backend-config="storage_account_name=${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              -backend-config="container_name=${{ secrets.CONTAINER_NAME }}" \
              -backend-config="resource_group_name=${{ secrets.RESOURCE_GROUP_NAME }}" \
              -backend-config="key=${{ secrets.TFSTATE_KEY }}"
        
        - name: Terraform fmt
          run: terraform fmt -check

        - name: Terraform validate
          run: terraform validate

  terraform-plan:
      runs-on: ubuntu-latest
      needs: terraform-validate
      defaults:
        run:
          working-directory: ./aks_cluster
      steps:
        # Checks out the repository this file is in
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: setup terraform
          uses: hashicorp/setup-terraform@v2

        - name: Azure Login
          uses: azure/login@v2
          with:
            client-id: ${{ secrets.AZURE_CLIENT_ID }}
            tenant-id: ${{ secrets.AZURE_TENANT_ID }}
            subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

        - name: Terraform plan
          run: |
            terraform plan \
              -var-file=terraform.tfvars \
              -out plan.tfplan

        - name: Upload plan artifact
          uses: actions/upload-artifact@v3
          with:
            name: tfplan
            path: ./aks_cluster/plan.tfplan

  terraform-apply:
      runs-on: ubuntu-latest
      needs: terraform-plan
      defaults:
        run:
          working-directory: ./aks_cluster
      steps:
        # Checks out the repository this file is in
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: setup terraform
          uses: hashicorp/setup-terraform@v2

        - name: Azure Login
          uses: azure/login@v2
          with:
            client-id: ${{ secrets.AZURE_CLIENT_ID }}
            tenant-id: ${{ secrets.AZURE_TENANT_ID }}
            subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

        - name: Download plan artifact
          uses: actions/download-artifact@v3
          with:
            name: tfplan
            path: ./aks_cluster/plan.tfplan

        - name: Terraform apply
          run: |
            terraform apply \
            -var-file=terraform.tfvars \
            -auto-approve plan.tfplan

  




